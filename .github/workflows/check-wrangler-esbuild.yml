name: Check wrangler esbuild version

on:
  schedule:
    - cron: '0 9 * * 1' # every Monday at 09:00 UTC
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check esbuild version bundled by latest wrangler
        id: check
        run: |
          WRANGLER_VERSION=$(npm view wrangler version)
          ESBUILD_VERSION=$(npm view "wrangler@${WRANGLER_VERSION}" dependencies.esbuild | tr -d '^~>=')
          echo "wrangler=${WRANGLER_VERSION}" >> "$GITHUB_OUTPUT"
          echo "esbuild=${ESBUILD_VERSION}" >> "$GITHUB_OUTPUT"
          # Compare semver: is esbuild >= 0.28.1?
          if printf '0.28.1\n%s\n' "$ESBUILD_VERSION" | sort -V -C; then
            echo "patched=true" >> "$GITHUB_OUTPUT"
          else
            echo "patched=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Open issue when esbuild is patched
        if: steps.check.outputs.patched == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const wrangler = '${{ steps.check.outputs.wrangler }}';
            const esbuild = '${{ steps.check.outputs.esbuild }}';

            // Don't open a duplicate if one is already open
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'security',
            });
            const already = issues.find(i => i.title.includes('esbuild CVE resolved'));
            if (already) {
              console.log('Issue already exists:', already.html_url);
              return;
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `chore: esbuild CVE resolved — upgrade wrangler to ${wrangler}`,
              labels: ['security'],
              body: [
                `wrangler \`${wrangler}\` now bundles esbuild \`${esbuild}\` (>= 0.28.1).`,
                '',
                'The dismissed Dependabot alerts for GHSA-gv7w-rqvm-qjhr and GHSA-g7r4-m6w7-qqqr are now fixable.',
                '',
                '**Action:** bump `wrangler` in `package.json` to `^' + wrangler + '` and run `npm install`.',
              ].join('\n'),
            });
