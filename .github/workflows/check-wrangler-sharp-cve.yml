name: Check wrangler sharp/libvips version

on:
  schedule:
    - cron: '0 9 * * 1' # every Monday at 09:00 UTC
  workflow_dispatch:

permissions:
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check sharp version bundled by latest wrangler's miniflare
        id: check
        run: |
          WRANGLER_VERSION=$(npm view wrangler version)
          MINIFLARE_VERSION=$(npm view "wrangler@${WRANGLER_VERSION}" dependencies.miniflare | tr -d '^~>=')
          SHARP_VERSION=$(npm view "miniflare@${MINIFLARE_VERSION}" dependencies.sharp | tr -d '^~>=')
          echo "wrangler=${WRANGLER_VERSION}" >> "$GITHUB_OUTPUT"
          echo "sharp=${SHARP_VERSION}" >> "$GITHUB_OUTPUT"
          # Compare semver: is sharp >= 0.35.0?
          if printf '0.35.0\n%s\n' "$SHARP_VERSION" | sort -V -C; then
            echo "patched=true" >> "$GITHUB_OUTPUT"
          else
            echo "patched=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Open issue when sharp is patched
        if: steps.check.outputs.patched == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const wrangler = '${{ steps.check.outputs.wrangler }}';
            const sharp = '${{ steps.check.outputs.sharp }}';

            // Don't open a duplicate if one is already open
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'security',
            });
            const already = issues.find(i => i.title.includes('sharp/libvips CVEs resolved'));
            if (already) {
              console.log('Issue already exists:', already.html_url);
              return;
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `chore: sharp/libvips CVEs resolved — upgrade wrangler to ${wrangler}`,
              labels: ['security'],
              body: [
                `wrangler \`${wrangler}\` now bundles sharp \`${sharp}\` (>= 0.35.0).`,
                '',
                'This resolves GHSA-f88m-g3jw-g9cj (CVE-2026-33327, CVE-2026-33328, CVE-2026-35590, CVE-2026-35591) in the transitive wrangler → miniflare → sharp devDependency chain (local `wrangler dev` tooling only — sharp is never bundled into the deployed Worker).',
                '',
                '**Action:** bump `wrangler` in `package.json` to `^' + wrangler + '` and run `npm install`.',
              ].join('\n'),
            });
